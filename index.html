<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Pokémon Battle – Start</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="start.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="scanlines"></div>

    <div class="console-shell">
        <header class="console-top">
            <div class="console-top-left">
                <span class="power-led"></span>
                <span class="console-label">POKéMON BATTLE</span>
            </div>
            <div class="console-top-right">
                <span class="battery-text">BATTERY</span>
                <span class="battery-icon">
                    <span class="battery-fill"></span>
                </span>
            </div>
        </header>

        <main class="console-screen">
            <div class="screen-bg">
                <div class="layer sky"></div>
                <div class="layer mountains"></div>
                <div class="layer grass"></div>
            </div>

            <div class="screen-content">
                <div class="logo">
                    <span class="logo-main">POKéMON</span>
                    <span class="logo-sub">RETRO BATTLE</span>
                </div>

                <a href="game.html" class="start-btn">
                    <span class="start-btn-border"></span>
                    <span class="start-btn-inner">
                        <span class="start-btn-shine"></span>
                        <span class="start-btn-text">Start Game</span>
                    </span>
                </a>
            </div>
        </main>

        <footer class="console-bottom">
            <div class="bottom-left">
                <div class="btn-circle btn-a">A</div>
                <div class="btn-circle btn-b">B</div>
            </div>
            <div class="bottom-right">
                <div class="btn-oval">SELECT</div>
                <div class="btn-oval">START</div>
            </div>
        </footer>
    </div>

    <script>
        // Fix for mobile URL bar affecting viewport height
        function updateViewportHeightVariable() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }

        // Set on load
        updateViewportHeightVariable();

        // Update on resize / orientation changes
        window.addEventListener('resize', updateViewportHeightVariable);
        window.addEventListener('orientationchange', updateViewportHeightVariable);
    </script>
</body>

</html>
